name: vscode-python-opt
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.13
  - pip
  - pip:
    - typer>=0.26.7
    - cplex>=22.2.0.0
    - docplex>=2.32.264
    - gurobipy>=13.0.2
    - highspy>=1.14.0
    - mip>=1.17.6
    - cffi>=2.0.0   # Ensures mip builds successfully on Windows
    - ortools>=9.15.6755
    - pychoco>=0.2.6,<0.3     # Issues with set_input_order_lb_search()
    - PySCIPOpt>=6.2.1
    - xpress>=9.9.0
    # dev dependencies
    - basedpyright>=1.39.8
